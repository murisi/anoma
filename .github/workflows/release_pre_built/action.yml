name: "Release pre built"
description: "Builds ex_doc scripts"
inputs:
  otp:
    description: "The major OTP version"
  otp_version:
    description: "The exact OTP version (major.minor[.patch])"
runs:
  using: "composite"
  steps:
    - uses: erlef/setup-beam@v1.18.2
      if: startsWith(runner.os, 'Linux') || startsWith(runner.os, 'Windows')
      with:
        otp-version: ${{ inputs.otp_version }}
        elixir-version: "1.17.3"
    - name: Install system dependencies
      shell: bash
      if: startsWith(runner.os, 'Linux')
      run: sudo apt install -y libsodium-dev protobuf-compiler
    - name: Install system dependencies
      shell: bash
      if: startsWith(runner.os, 'macOS')
      run: brew install elixir protobuf
    - name: Build ex_doc
      if: startsWith(runner.os, 'Linux') || startsWith(runner.os, 'macOS')
      shell: bash
      run: |
        mix deps.get
        mix escript.install hex protobuf --force
        PATH="$HOME/.mix/escripts:$PATH" mix release
        cd _build/dev/rel/
        tar czf anoma.tar.gz anoma
        shasum -a 1 anoma.tar.gz > anoma.tar.gz.sha1sum
        shasum -a 256 anoma.tar.gz > anoma.tar.gz.sha256sum
    - name: Build ex_doc
      if: startsWith(runner.os, 'Windows')
      shell: pwsh
      run: |
        & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        mix deps.get --force
        mix escript.install hex protobuf --force
        $env:PATH += $env:USERPROFILE + '\.mix\escripts;'
        vcpkg install libsodium
        $env:INCLUDE += $env:VCPKG_INSTALLATION_ROOT + '\packages\libsodium_x64-windows\include;'
        $env:LIB += $env:VCPKG_INSTALLATION_ROOT + '\packages\libsodium_x64-windows\lib;'
        choco install protoc
        mix release
        cd _build\dev\rel
        tar czf anoma.tar.gz anoma
        {Get-FileHash -Path anoma.tar.gz -Algorithm SHA1 | Select-Object Hash | Format-Table -HideTableHeaders | Out-File anoma.tar.gz.sha1sum}
        {Get-FileHash -Path anoma.tar.gz -Algorithm SHA256 | Select-Object Hash | Format-Table -HideTableHeaders | Out-File anoma.tar.gz.sha256sum}
